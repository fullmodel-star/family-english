<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E9F3E0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家庭生活英語">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>家庭生活英語</title>
<link rel="stylesheet" href="ridgeline-ui.css">
<link rel="icon" href="favicon.svg" type="image/svg+xml">

<style>
:root{
  /* 稜線識別 · theme-grass（草綠）— 主色改草綠，紙背＋岩藍墨；狀態色（綠/紅/琥珀）保留語意 */
  --sky:#4C9A3F; --sky2:#4C9A3F; --sky3:#DCEBCF; --deep:#2C4A20;
  --bg:#F7F3EC; --card:#FFFFFF; --ink:#141E2B; --sub:#6E8BA3; --line:#E4DDCE;
  --good:#10b981; --bad:#ef4444; --gold:#f59e0b; --sos:#e11d48; --shadow:0 0 0 1px var(--line);
  --r:18px; --fs:1;
}
html[data-theme=dark]{
  --bg:#141E2B; --card:#1B2838; --ink:#EEF3F6; --sub:#8b96a8; --line:#2A3A4E;
  --sky:#6FBF5F; --sky2:#6FBF5F; --deep:#9ED18C; --shadow:0 0 0 1px var(--line);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  background:var(--bg); color:var(--ink);
  padding-bottom:calc(76px + env(safe-area-inset-bottom));
  overscroll-behavior-y:contain; font-size:calc(16px * var(--fs));
}
body.big{--fs:1.22}
h1,h2,h3,p{margin:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.hidden{display:none!important}

/* 稜線識別：頁首 masthead（取代原漸層 topbar，扁平草綠） */
.topbar{position:sticky;top:0;z-index:40;background:var(--hdr);color:var(--on);padding:env(safe-area-inset-top) 0 0}
.topbar .rl-appbar{max-width:640px;margin:0 auto;background:transparent;color:var(--on);padding:12px 14px 6px;gap:12px}
.topbar .rl-appbar .rl-glyph .ridge{stroke:var(--on)}
.topbar .stats{max-width:640px;width:100%;margin:0 auto;padding:0 14px 12px;box-sizing:border-box;display:flex;gap:8px;flex-wrap:wrap}
.chip{background:color-mix(in srgb,var(--on) 12%,transparent);color:var(--on);border-radius:999px;padding:5px 11px;font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:5px}
.iconbtn{width:38px;height:38px;border-radius:12px;background:color-mix(in srgb,var(--on) 12%,transparent);color:var(--on);display:grid;place-items:center;font-size:18px;flex:none}
.stats .chip{background:color-mix(in srgb,var(--on) 10%,transparent)}
.rl-signature{padding-bottom:calc(32px + env(safe-area-inset-bottom) + 76px)}

.wrap{max-width:640px;margin:0 auto;padding:14px}
.section-title{font-size:.88rem;font-weight:800;color:var(--sub);margin:18px 4px 10px;letter-spacing:.5px}

.banner{background:#fff7ed;border-radius:var(--r);padding:15px 16px;
  display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);margin-bottom:8px;border:1px solid #fde3c4}
html[data-theme=dark] .banner{background:#3a2a12;border-color:#4a3618}
.banner .big{font-size:30px}
.banner .t{flex:1}
.banner .t b{font-size:1rem}
.banner .t small{color:var(--sub);font-size:.78rem}
.banner .go{background:var(--gold);color:#fff;font-weight:800;padding:9px 15px;border-radius:12px;font-size:.88rem;white-space:nowrap}
.banner.rev{background:#eff6ff;border-color:#bfdbfe}
html[data-theme=dark] .banner.rev{background:#122036;border-color:#1e3a5f}
.banner.rev .go{background:var(--sky)}
.banner.sos{background:#fff1f2;border-color:#fecdd3}
html[data-theme=dark] .banner.sos{background:#3a1220;border-color:#5a1a2a}
.banner.sos .go{background:var(--sos)}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.scard{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:var(--shadow);position:relative;overflow:hidden;text-align:left;transition:transform .1s}
.scard:active{transform:scale(.97)}
.scard .ico{font-size:30px;line-height:1}
.scard .nm{font-weight:800;font-size:.95rem;margin-top:8px}
.scard .en{font-size:.68rem;color:var(--sub);margin-top:1px}
.scard .desc{font-size:.72rem;color:var(--sub);margin-top:6px;line-height:1.35;min-height:31px}
.pbar{height:6px;border-radius:99px;background:var(--line);margin-top:10px;overflow:hidden}
.pbar>i{display:block;height:100%;background:var(--sky);border-radius:99px;transition:width .4s}
.scard .pct{position:absolute;top:12px;right:12px;font-size:.68rem;font-weight:800;color:var(--sky)}
.scard .done-badge{position:absolute;top:10px;right:10px;font-size:18px}

.back{display:flex;align-items:center;gap:6px;font-weight:700;color:var(--sky);font-size:.95rem;padding:4px 0}
.detail-head{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin:8px 0 4px;text-align:center}
.detail-head .ico{font-size:44px}
.detail-head h2{font-size:1.25rem;font-weight:800;margin-top:4px}
.detail-head .en{color:var(--sub);font-size:.82rem}
.modes{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.mode{background:var(--card);border-radius:14px;padding:11px 4px;box-shadow:var(--shadow);text-align:center;transition:transform .1s}
.mode:active{transform:scale(.95)}
.mode .mi{font-size:21px}
.mode .ml{font-size:.68rem;font-weight:700;margin-top:4px;line-height:1.2}

.pitem{background:var(--card);border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);margin-bottom:9px;display:flex;gap:11px;align-items:flex-start}
.pitem.sos-item{border-left:4px solid var(--sos)}
.pitem .body{flex:1;min-width:0}
.pitem .en{font-weight:700;font-size:.97rem;line-height:1.35}
.pitem .zh{color:var(--sub);font-size:.85rem;margin-top:3px}
.pitem .homo{color:var(--sos);font-size:.8rem;margin-top:2px;font-weight:600}
.pitem .tip{color:var(--sky);font-size:.75rem;margin-top:4px;background:rgba(76,154,63,.08);padding:3px 8px;border-radius:8px;display:inline-block}
.pitem .metarow{display:flex;gap:6px;align-items:center;margin-top:5px;flex-wrap:wrap}
.lv{font-size:.62rem;font-weight:800;padding:2px 6px;border-radius:6px;color:#fff}
.lv1{background:#22c55e}.lv2{background:#f59e0b}.lv3{background:#ef4444}
.stars{font-size:.68rem;letter-spacing:1px;color:var(--gold)}
.pitem .acts{display:flex;flex-direction:column;gap:8px}
.rbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:17px;background:var(--bg);border:1px solid var(--line)}
.rbtn.fav.on{color:var(--gold);background:rgba(245,158,11,.12);border-color:transparent}
.shadowline{font-size:1.35rem;font-weight:800;line-height:1.55;margin:10px 0;text-align:center}
.wok{color:var(--good)}
.wmiss{color:var(--bad);text-decoration:underline;text-decoration-style:wavy;text-underline-offset:3px}
.misschip{background:rgba(239,68,68,.1);color:var(--bad);border:1px solid var(--bad);border-radius:9px;padding:3px 9px;margin:3px 3px 0;font-size:.8rem;font-weight:700;display:inline-block}
.fbnote{font-size:.72rem;opacity:.68;margin-top:7px;line-height:1.4}
.keyok{color:var(--good);font-weight:700}
.primcta{display:flex;gap:10px;margin:12px 0 4px}
.primbtn{flex:1;background:var(--sky);color:#fff;font-weight:800;font-size:1.05rem;padding:15px 10px;border-radius:16px;box-shadow:var(--shadow)}
.primbtn.ghost2{background:var(--card);color:var(--sky);border:1.5px solid var(--sky)}
.modehint{font-size:.76rem;color:var(--sub);margin:10px 4px 4px;line-height:1.4}
.bigshow{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;gap:18px}
.bigshow .ben{font-size:2.1rem;font-weight:800;line-height:1.35}
.bigshow .bzh{font-size:1.15rem;color:var(--sub)}
.bigshow .bhomo{font-size:1.05rem;color:var(--sos);font-weight:700}
.bigshow .tello{font-size:.8rem;color:var(--sub);background:rgba(76,154,63,.1);padding:6px 12px;border-radius:10px}
.banner.trip{background:#eef2ff;border-color:#c7d2fe}
html[data-theme=dark] .banner.trip{background:#1a1f3a;border-color:#2a3160}
.banner.trip .go{background:var(--sky)}
.wzq{font-weight:800;font-size:.98rem;margin:16px 4px 8px}.wzq small{font-weight:400;color:var(--sub);font-size:.8rem}
.wzin{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-size:1rem;font-family:inherit}
.wzchips{display:flex;flex-wrap:wrap;gap:8px}
.wzchip{padding:10px 13px;border-radius:12px;border:1.5px solid var(--line);background:var(--card);color:var(--ink);font-size:.9rem;font-weight:700}
.wzchip.on{background:var(--sky);color:#fff;border-color:transparent}
.cheatsc{font-weight:800;font-size:.9rem;color:var(--sky);margin:16px 4px 8px;border-bottom:2px solid var(--line);padding-bottom:5px}
.cheatrow{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:12px;padding:11px 13px;margin-bottom:7px;box-shadow:var(--shadow)}
.cheatrow .cen{font-weight:700;font-size:.98rem;line-height:1.35}
.cheatrow .czh{color:var(--sub);font-size:.82rem;margin-top:2px}
.primbtn.kid{background:#f472b6}
.kggrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:10px}
.kgopt{background:var(--card);border-radius:18px;padding:18px 8px;box-shadow:var(--shadow);border:2px solid transparent;transition:transform .1s}
.kgopt:active{transform:scale(.95)}
.kgico{font-size:52px;line-height:1}
.kgzh{font-size:.9rem;font-weight:700;margin-top:8px;color:var(--sub)}
.kgopt.kgok{border-color:var(--good);background:rgba(16,185,129,.12)}
.kgopt.kgbad{border-color:var(--bad);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.stickerbook{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:10px;margin-top:6px}
.stik{background:var(--card);border-radius:14px;box-shadow:var(--shadow);aspect-ratio:1;display:grid;place-items:center;font-size:34px}
.lostcard{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:24px;gap:16px}
.lostcard .lem{font-size:56px}
.lostcard .len{font-size:1.7rem;font-weight:800;line-height:1.4}
.lostcard .lzh{font-size:1.05rem;color:var(--sub)}
.lostcard .lphone{font-size:1.5rem;font-weight:800;color:var(--sos);letter-spacing:1px}

.tagbar{display:flex;gap:7px;overflow-x:auto;padding:4px 2px 10px;-webkit-overflow-scrolling:touch}
.tagbar::-webkit-scrollbar{display:none}
.tg{white-space:nowrap;font-size:.82rem;font-weight:700;padding:6px 13px;border-radius:99px;background:var(--card);border:1px solid var(--line);color:var(--sub)}
.tg.on{background:var(--sky);color:#fff;border-color:transparent}

.nav{position:fixed;left:0;right:0;bottom:0;z-index:45;background:var(--card);border-top:1px solid var(--line);display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.68rem;color:var(--sub);padding:5px 0;font-weight:700}
.nav button .ni{font-size:20px}
.nav button.on{color:var(--sky)}
.nav button.sosnav.on{color:var(--sos)}

.overlay{position:fixed;inset:0;z-index:60;background:var(--bg);display:flex;flex-direction:column;animation:slideup .25s}
@keyframes slideup{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.ovhead{display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top) + 12px) 16px 10px}
.ovhead .x{font-size:24px;width:34px}
.ovprog{flex:1;height:8px;border-radius:99px;background:var(--line);overflow:hidden}
.ovprog>i{display:block;height:100%;background:var(--sky);width:0;transition:width .3s}
.ovhead .cnt{font-weight:800;font-size:.85rem;color:var(--sub)}
.ovbody{flex:1;overflow-y:auto;padding:10px 18px 20px;display:flex;flex-direction:column}
.ovfoot{padding:12px 18px calc(16px + env(safe-area-inset-bottom));display:flex;gap:10px}
.overlay>.ovhead,.overlay>.ovbody,.overlay>.ovfoot{max-width:680px;width:100%;margin-left:auto;margin-right:auto;box-sizing:border-box}
.pbtn{flex:1;padding:15px;border-radius:15px;font-weight:800;font-size:1rem;background:var(--sky);color:#fff;box-shadow:var(--shadow)}
.pbtn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.pbtn.good{background:var(--good)}.pbtn.bad{background:var(--bad)}
.pbtn:disabled{opacity:.4}

.flash{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;gap:14px}
.flash .card3d{background:var(--card);border-radius:24px;box-shadow:var(--shadow);padding:32px 24px;width:100%;min-height:220px;display:flex;flex-direction:column;justify-content:center;gap:14px}
.flash .big-en{font-size:1.6rem;font-weight:800;line-height:1.35}
.flash .big-zh{font-size:1.2rem;color:var(--sub)}
.flash .homo2{font-size:1rem;color:var(--sos);font-weight:700}
.flash .tip2{font-size:.85rem;color:var(--sky);background:rgba(76,154,63,.08);padding:7px 12px;border-radius:10px}
.flash .wico{font-size:56px}
.speak{background:var(--sky);color:#fff;border-radius:99px;padding:12px 22px;font-weight:800;font-size:.95rem;display:inline-flex;gap:8px;align-items:center;box-shadow:var(--shadow)}
.tapkuce{color:var(--sub);font-size:.82rem}

.qword{font-size:1.5rem;font-weight:800;text-align:center;margin:12px 0 4px;line-height:1.4}
.qsub{text-align:center;color:var(--sub);margin-bottom:16px;font-size:.88rem}
.opt{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:15px;margin-bottom:11px;font-size:1rem;font-weight:600;text-align:left;transition:.15s;width:100%}
.opt:active{transform:scale(.98)}
.opt.ok{border-color:var(--good);background:rgba(16,185,129,.1);color:var(--good);font-weight:800}
.opt.no{border-color:var(--bad);background:rgba(239,68,68,.1);color:var(--bad)}

.teach{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-top:6px;border-left:4px solid var(--sky);animation:pop .2s}
.teach .r{margin:5px 0;font-size:.95rem}
.teach .r.wrong{color:var(--bad)}.teach .r.right{color:var(--good);font-weight:800}
.teach .tipbox{background:rgba(76,154,63,.08);color:var(--sky);border-radius:10px;padding:9px 12px;margin-top:8px;font-size:.85rem}

.scz-target{min-height:60px;background:var(--card);border:2px dashed var(--line);border-radius:14px;padding:12px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;margin-bottom:6px}
.scz-target.err{border-color:var(--bad);animation:shake .35s}
.scz-target.ok{border-color:var(--good)}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.scz-pool{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
.tok{background:var(--sky);color:#fff;border-radius:11px;padding:9px 14px;font-size:1rem;font-weight:700;box-shadow:var(--shadow)}
.tok.inpool{background:var(--card);color:var(--ink);border:1px solid var(--line);box-shadow:none}

.mic-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center}
.mic{width:92px;height:92px;border-radius:50%;background:var(--sky);color:#fff;font-size:38px;display:grid;place-items:center;transition:transform .15s}
.mic.rec{animation:pulse 1s infinite;background:var(--bad)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.heard{font-size:.9rem;color:var(--sub);min-height:22px}
.scorebig{font-size:3.1rem;font-weight:900}
.w-good{color:var(--good)}.w-mid{color:var(--gold)}.w-bad{color:var(--bad)}

.chat{flex:1;display:flex;flex-direction:column;gap:10px;padding:6px 0}
.bubble{max-width:82%;padding:11px 14px;border-radius:16px;font-size:.97rem;line-height:1.4;box-shadow:var(--shadow);animation:pop .2s}
@keyframes pop{from{transform:scale(.9);opacity:0}to{transform:none;opacity:1}}
.bubble .z{font-size:.78rem;opacity:.75;margin-top:3px}
.bubble.npc{background:var(--card);align-self:flex-start;border-bottom-left-radius:5px}
.bubble.you{background:var(--sky);color:#fff;align-self:flex-end;border-bottom-right-radius:5px}
.roleask{text-align:center;color:var(--sub);font-size:.82rem;margin:6px 0}

.patcard{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:22px;text-align:center}
.patcard .frame{font-size:1.4rem;font-weight:800;line-height:1.5;margin-bottom:6px}
.patcard .slot{color:var(--sky);border-bottom:2px dashed var(--sky)}
.slotbtns{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-top:14px}
.slotbtn{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:10px 15px;font-weight:700;font-size:.95rem}
.slotbtn.on{background:var(--sky);color:#fff;border-color:transparent}

.toast{position:fixed;left:50%;top:22%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:14px;font-weight:800;z-index:100;box-shadow:var(--shadow);animation:pop .2s;max-width:86vw;text-align:center}
.pop-heart{position:fixed;font-size:30px;z-index:120;pointer-events:none;animation:floatUp 1s ease-out forwards}
@keyframes floatUp{to{transform:translateY(-90px) scale(1.6);opacity:0}}

.searchbox{width:100%;padding:13px 16px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:1rem;box-shadow:var(--shadow)}
.searchbox:focus{outline:2px solid var(--sky)}

.prof{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
.pill{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:11px 16px;font-weight:800;font-size:.95rem;display:flex;align-items:center;gap:8px}
.pill.on{border-color:var(--sky);color:var(--sky);background:rgba(76,154,63,.08)}
.bandsel{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:8px 0}
.bandopt{background:var(--card);border:2px solid var(--line);border-radius:14px;padding:12px;text-align:left;box-shadow:var(--shadow)}
.bandopt.on{border-color:var(--sky);background:rgba(76,154,63,.06)}
.bandopt b{font-size:.95rem}.bandopt small{display:block;color:var(--sub);font-size:.72rem;margin-top:3px;line-height:1.3}
.setrow{background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.setrow .lab b{font-size:.95rem}.setrow .lab small{color:var(--sub);font-size:.78rem;display:block;margin-top:2px}
.switch{width:52px;height:30px;border-radius:99px;background:var(--line);position:relative;transition:.2s;flex:none}
.switch.on{background:var(--sky)}
.switch>i{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:.2s}
.switch.on>i{left:25px}
.stepper{display:flex;align-items:center;gap:12px}
.stepper button{width:34px;height:34px;border-radius:10px;background:var(--bg);border:1px solid var(--line);font-size:20px;font-weight:800}
.emptybox{text-align:center;color:var(--sub);padding:40px 20px;font-size:.88rem}
.emptybox .e{font-size:40px}

.badges{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:8px 0}
.badge{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px 4px;text-align:center;opacity:.35;filter:grayscale(1)}
.badge.got{opacity:1;filter:none}
.badge .bi{font-size:26px}
.badge .bn{font-size:.62rem;font-weight:700;margin-top:4px;color:var(--sub)}

.refcard{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:11px}
.refcard h3{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:8px}
.refrow{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:.85rem;align-items:baseline}
.refrow:last-child{border:none}

window.__SCENARIOS__ = [{"id": "morning-routine", "icon": "🌅", "title": "起床晨間", "titleEn": "Morning Routine", "desc": "早上起床、刷牙換衣、趕著出門上學會用到", "words": [{"en": "wake up", "zh": "醒來", "ico": "😴"}, {"en": "sleepy", "zh": "想睡的", "ico": "🥱"}, {"en": "alarm", "zh": "鬧鐘", "ico": "⏰"}, {"en": "brush teeth", "zh": "刷牙", "ico": "🪥"}, {"en": "wash face", "zh": "洗臉", "ico": "🧼"}, {"en": "get dressed", "zh": "換衣服", "ico": "👕"}, {"en": "breakfast", "zh": "早餐", "ico": "🍳"}, {"en": "hurry", "zh": "趕快", "ico": "🏃"}], "patterns": [{"en": "It's time to ___.", "zh": "該去___了。", "slots": ["get up", "brush your teeth", "go to school"]}, {"en": "I need to ___ first.", "zh": "我要先___。", "slots": ["wash my face", "get dressed", "eat breakfast"]}], "phrases": [{"en": "Good morning!", "zh": "早安！", "tag": "打招呼", "level": 1, "survival": true, "homophone": "古得 摸寧！"}, {"en": "Time to wake up!", "zh": "該起床囉！", "tag": "叫起床", "level": 1, "survival": true, "homophone": "太姆 特 位克 阿舖！"}, {"en": "I'm still sleepy.", "zh": "我還很想睡。", "tag": "賴床", "level": 1, "survival": false, "homophone": "愛姆 斯提爾 斯利批。"}, {"en": "Five more minutes, please.", "zh": "再五分鐘就好。", "tag": "賴床", "level": 1, "survival": true, "homophone": "法伊夫 摩爾 迷你此，普利斯。"}, {"en": "Did you turn off the alarm?", "zh": "你關掉鬧鐘了嗎？", "tag": "詢問", "level": 1, "survival": false, "homophone": "低啾 特恩 歐夫 責 阿拉姆？"}, {"en": "Go brush your teeth.", "zh": "去刷牙。", "tag": "催促", "level": 1, "survival": false, "homophone": "購 布拉許 幼兒 提斯。"}, {"en": "Don't forget to wash your face.", "zh": "別忘了洗臉。", "tag": "提醒", "level": 1, "survival": false, "homophone": "動特 佛兒給特 特 挖許 幼兒 費斯。"}, {"en": "Hurry up, or you'll be late.", "zh": "快一點，不然你會遲到。", "tag": "催促", "level": 1, "survival": false, "homophone": "哈瑞 阿舖，歐兒 優喔 逼 累特。"}, {"en": "What do you want for breakfast?", "zh": "你早餐想吃什麼？", "tag": "詢問", "level": 1, "survival": false}, {"en": "I can't find my school uniform.", "zh": "我找不到我的制服。", "tag": "求助", "level": 1, "survival": false}, {"en": "Make sure you pack your bag.", "zh": "記得把書包整理好。", "tag": "提醒", "level": 1, "survival": false}, {"en": "Finish your breakfast before you leave.", "zh": "出門前把早餐吃完。", "tag": "催促", "level": 1, "survival": false}], "dialogue": {"title": "起床晨間 情境對話", "youRole": "孩子", "npcRole": "媽媽", "lines": [{"who": "you", "en": "Mom, is it time to get up already?", "zh": "媽，已經要起床了嗎？"}, {"who": "npc", "en": "Yes, it's seven o'clock. Come on, wake up!", "zh": "對，七點了。快點，起床囉！"}, {"who": "you", "en": "I'm so sleepy. Five more minutes, please.", "zh": "我好睏。再五分鐘就好嘛。"}, {"who": "npc", "en": "No more sleeping in. You'll be late for school.", "zh": "不能再賴床了，你上學會遲到。"}, {"who": "you", "en": "Okay, okay. I'm getting up now.", "zh": "好啦好啦，我現在起來了。"}, {"who": "npc", "en": "Good. Go brush your teeth and wash your face.", "zh": "很好。去刷牙洗臉。"}, {"who": "you", "en": "Where is my school uniform?", "zh": "我的制服在哪裡？"}, {"who": "npc", "en": "It's on your chair. Get dressed quickly.", "zh": "在你的椅子上。快點換衣服。"}, {"who": "you", "en": "I'm ready. What's for breakfast?", "zh": "我好了。早餐吃什麼？"}, {"who": "npc", "en": "Eggs and toast. Eat up, the bus is coming!", "zh": "蛋和吐司。快吃，公車要來了！"}]}, "country": "US"}, {"id": "meals-home", "icon": "🍚", "title": "家庭用餐", "titleEn": "Meals at Home", "desc": "在家吃飯、幫忙擺碗筷和收拾時會用到的日常對話", "words": [{"en": "dinner", "zh": "晚餐", "ico": "🍽️"}, {"en": "rice", "zh": "飯", "ico": "🍚"}, {"en": "bowl", "zh": "碗", "ico": "🥣"}, {"en": "chopsticks", "zh": "筷子", "ico": "🥢"}, {"en": "plate", "zh": "盤子", "ico": "🍽️"}, {"en": "delicious", "zh": "美味的", "ico": "😋"}, {"en": "full", "zh": "吃飽的", "ico": "🤤"}, {"en": "hungry", "zh": "餓的", "ico": "😣"}], "patterns": [{"en": "Can I have some more ___, please?", "zh": "我可以再要一點___嗎？", "slots": ["rice", "soup", "vegetables"]}, {"en": "Can you help me set the ___?", "zh": "你可以幫我擺___嗎？", "slots": ["table", "bowls", "chopsticks"]}], "phrases": [{"en": "Dinner is ready!", "zh": "晚餐好了！", "tag": "開飯", "level": 1, "survival": true, "homophone": "丁呢兒 一斯 瑞底！"}, {"en": "I'm hungry.", "zh": "我餓了。", "tag": "感受", "level": 1, "survival": true, "homophone": "愛姆 航鬼瑞。"}, {"en": "Let's eat!", "zh": "開動吧！", "tag": "開飯", "level": 1, "survival": true, "homophone": "累此 依特！"}, {"en": "Can I help you?", "zh": "我可以幫忙嗎？", "tag": "幫忙", "level": 1, "survival": false, "homophone": "肯 愛 黑耨舖 優？"}, {"en": "Please pass me a bowl.", "zh": "請把碗遞給我。", "tag": "請求", "level": 1, "survival": false, "homophone": "普利斯 趴斯 米 阿 波爾。"}, {"en": "Where do the chopsticks go?", "zh": "筷子要放哪裡？", "tag": "擺碗筷", "level": 1, "survival": false, "homophone": "位兒 賭 責 洽普斯踢克斯 購？"}, {"en": "Can I have some more rice, please?", "zh": "我可以再要一點飯嗎？", "tag": "請求", "level": 2, "survival": false, "homophone": "肯 愛 黑夫 山姆 摩爾 軟斯，普利斯？"}, {"en": "This is delicious!", "zh": "這個好好吃！", "tag": "稱讚", "level": 1, "survival": false, "homophone": "低斯 一斯 底利舍斯！"}, {"en": "I'm full, thank you.", "zh": "我吃飽了，謝謝。", "tag": "回應", "level": 1, "survival": false}, {"en": "Thank you for the meal.", "zh": "謝謝你做的飯。", "tag": "道謝", "level": 1, "survival": false}, {"en": "Let me help you clear the table.", "zh": "我來幫你收拾餐桌。", "tag": "收拾", "level": 2, "survival": false}, {"en": "I'll put the dishes in the sink.", "zh": "我把碗盤放到水槽。", "tag": "收拾", "level": 2, "survival": false}], "dialogue": {"title": "家庭用餐 情境對話", "youRole": "孩子", "npcRole": "媽媽", "lines": [{"who": "you", "en": "Mom, I'm hungry. Is dinner ready?", "zh": "媽媽，我餓了。晚餐好了嗎？"}, {"who": "npc", "en": "Almost! Can you help me set the table?", "zh": "快好了！你可以幫我擺餐桌嗎？"}, {"who": "you", "en": "Sure. Where do the bowls and chopsticks go?", "zh": "好啊。碗和筷子要放哪裡？"}, {"who": "npc", "en": "Put a bowl and chopsticks in front of each seat.", "zh": "每個位子前面放一個碗和一雙筷子。"}, {"who": "you", "en": "All done! Wow, this smells delicious.", "zh": "擺好了！哇，這個聞起來好香。"}, {"who": "npc", "en": "Thank you. Let's eat while it's hot.", "zh": "謝謝你。趁熱吃吧。"}, {"who": "you", "en": "Can I have some more rice, please?", "zh": "我可以再要一點飯嗎？"}, {"who": "npc", "en": "Of course. Here you go.", "zh": "當然可以。來，給你。"}, {"who": "you", "en": "I'm full, thank you. That was really good.", "zh": "我吃飽了，謝謝。真的很好吃。"}, {"who": "npc", "en": "I'm glad you liked it. Let's clear the table together.", "zh": "很高興你喜歡。我們一起收拾餐桌吧。"}]}, "country": "US"}, {"id": "chores", "icon": "🧹", "title": "家事分工", "titleEn": "Doing Chores", "desc": "在家幫忙做家事、分配工作和輪流時用的說法", "words": [{"en": "sweep", "zh": "掃地", "ico": "🧹"}, {"en": "trash", "zh": "垃圾", "ico": "🗑️"}, {"en": "dishes", "zh": "碗盤", "ico": "🍽️"}, {"en": "laundry", "zh": "待洗衣物", "ico": "🧺"}, {"en": "fold", "zh": "摺（衣服）", "ico": "👕"}, {"en": "vacuum", "zh": "吸地板", "ico": "🔌"}, {"en": "chore", "zh": "家事", "ico": "🏠"}, {"en": "messy", "zh": "亂的", "ico": "🌀"}], "patterns": [{"en": "Can you help me ___?", "zh": "你可以幫我___嗎？", "slots": ["sweep the floor", "take out the trash", "wash the dishes"]}, {"en": "It's my turn to ___.", "zh": "輪到我___了。", "slots": ["do the dishes", "clean the table", "fold the clothes"]}], "phrases": [{"en": "I'll help you clean up.", "zh": "我來幫你打掃。", "tag": "主動幫忙", "level": 1, "survival": true, "homophone": "愛喔 黑耨舖 優 克林 阿舖。"}, {"en": "What can I do?", "zh": "我可以做什麼？", "tag": "詢問", "level": 1, "survival": true, "homophone": "華特 肯 愛 賭？"}, {"en": "Sure, I'll do it now.", "zh": "好，我現在就去做。", "tag": "回應", "level": 1, "survival": true, "homophone": "秀兒 愛喔 賭 一特 惱。"}, {"en": "Where should I put this?", "zh": "這個我該放哪裡？", "tag": "詢問", "level": 1, "survival": false, "homophone": "位兒 恕得 愛 舖特 低斯？"}, {"en": "Can you take out the trash?", "zh": "你可以去倒垃圾嗎？", "tag": "請求", "level": 1, "survival": false, "homophone": "肯 優 貼克 澳特 責 抓許？"}, {"en": "It's your turn to wash the dishes.", "zh": "輪到你洗碗了。", "tag": "分工", "level": 2, "survival": false, "homophone": "一此 幼兒 特恩 特 挖許 責 弟需斯。"}, {"en": "I already swept the floor.", "zh": "我已經把地掃好了。", "tag": "回報", "level": 1, "survival": false, "homophone": "愛 歐瑞地 斯位普特 責 佛樓兒。"}, {"en": "Let's fold the laundry together.", "zh": "我們一起摺衣服吧。", "tag": "邀請", "level": 1, "survival": false, "homophone": "累此 佛得 責 攏助瑞 特給澤兒。"}, {"en": "My room is really messy.", "zh": "我的房間好亂。", "tag": "描述", "level": 1, "survival": false}, {"en": "Can we take turns doing the dishes?", "zh": "我們可以輪流洗碗嗎？", "tag": "分工", "level": 2, "survival": false}, {"en": "I'll vacuum the living room after dinner.", "zh": "晚餐後我會去吸客廳的地板。", "tag": "安排", "level": 2, "survival": false}, {"en": "Don't worry, I've finished all my chores.", "zh": "別擔心，我的家事都做完了。", "tag": "回報", "level": 2, "survival": false}], "dialogue": {"title": "家事分工 情境對話", "youRole": "孩子", "npcRole": "爸爸", "lines": [{"who": "you", "en": "Dad, what can I do to help?", "zh": "爸，我可以幫什麼忙？"}, {"who": "npc", "en": "Great! Can you sweep the floor first?", "zh": "太好了！你可以先掃地嗎？"}, {"who": "you", "en": "Sure. Where's the broom?", "zh": "好啊。掃把在哪裡？"}, {"who": "npc", "en": "It's behind the kitchen door.", "zh": "在廚房門後面。"}, {"who": "you", "en": "Okay. Should I take out the trash too?", "zh": "好。我也要去倒垃圾嗎？"}, {"who": "npc", "en": "Yes, please. The bag is already full.", "zh": "好，麻煩你。垃圾袋已經滿了。"}, {"who": "you", "en": "No problem. What about the dishes?", "zh": "沒問題。那碗盤呢？"}, {"who": "npc", "en": "Let's take turns. I'll wash, you dry.", "zh": "我們輪流吧。我洗，你擦乾。"}, {"who": "you", "en": "Sounds fair. Can we fold the laundry after that?", "zh": "很公平。之後我們可以一起摺衣服嗎？"}, {"who": "npc", "en": "Sure. Thanks for helping out today.", "zh": "當然。謝謝你今天幫忙。"}]}, "country": "US"}, {"id": "screen-time", "icon": "📺", "title": "看電視手機", "titleEn": "TV & Screen Time", "desc": "看電視、玩手機平板、討論使用時間與該關掉時說的話", "words": [{"en": "TV", "zh": "電視", "ico": "📺"}, {"en": "phone", "zh": "手機", "ico": "📱"}, {"en": "tablet", "zh": "平板", "ico": "📲"}, {"en": "cartoon", "zh": "卡通", "ico": "🐭"}, {"en": "game", "zh": "遊戲", "ico": "🎮"}, {"en": "screen", "zh": "螢幕", "ico": "🖥️"}, {"en": "minute", "zh": "分鐘", "ico": "⏱️"}, {"en": "bedtime", "zh": "睡覺時間", "ico": "🛏️"}], "patterns": [{"en": "Can I ___ for a bit?", "zh": "我可以___一下嗎？", "slots": ["watch TV", "play a game", "use the tablet"]}, {"en": "It's time to ___.", "zh": "該___了。", "slots": ["turn it off", "stop playing", "go to bed"]}], "phrases": [{"en": "Can I watch TV now?", "zh": "我現在可以看電視嗎？", "tag": "請求", "level": 1, "survival": true, "homophone": "肯 愛 挖區 踢逼 惱？"}, {"en": "Can I play on the tablet?", "zh": "我可以玩平板嗎？", "tag": "請求", "level": 1, "survival": true, "homophone": "肯 愛 普累 暗 責 貼布利特？"}, {"en": "Just five more minutes, please.", "zh": "拜託再五分鐘就好。", "tag": "拜託", "level": 1, "survival": true, "homophone": "賈斯特 法伊夫 摩爾 迷你此，普利斯。"}, {"en": "What are you watching?", "zh": "你在看什麼？", "tag": "閒聊", "level": 1, "survival": false, "homophone": "華特 阿兒 優 挖親？"}, {"en": "Can I play one more game?", "zh": "我可以再玩一場遊戲嗎？", "tag": "請求", "level": 1, "survival": false, "homophone": "肯 愛 普累 萬 摩爾 給姆？"}, {"en": "I'll turn it off after this one.", "zh": "這個看完我就關掉。", "tag": "回應", "level": 2, "survival": false, "homophone": "愛喔 特恩 一特 歐夫 阿福特兒 低斯 萬。"}, {"en": "How long can I use the phone?", "zh": "我可以用手機多久？", "tag": "詢問", "level": 2, "survival": false, "homophone": "好 郎 肯 愛 又斯 責 佛恩？"}, {"en": "The show is almost over.", "zh": "這節目快演完了。", "tag": "說明", "level": 1, "survival": false, "homophone": "責 秀 一斯 歐爾摸斯特 歐佛兒。"}, {"en": "You've had enough screen time for today.", "zh": "你今天看螢幕的時間已經夠了。", "tag": "規定", "level": 2, "survival": false}, {"en": "Please turn off the TV and get ready for bed.", "zh": "請關掉電視，準備去睡覺。", "tag": "指示", "level": 2, "survival": false}, {"en": "You can watch for thirty minutes a day.", "zh": "你一天可以看三十分鐘。", "tag": "規定", "level": 2, "survival": false}, {"en": "Okay, I'll put my phone away.", "zh": "好啦，我把手機收起來。", "tag": "回應", "level": 1, "survival": false}], "dialogue": {"title": "看電視手機 情境對話", "youRole": "孩子", "npcRole": "媽媽", "lines": [{"who": "you", "en": "Mom, can I watch TV for a bit?", "zh": "媽，我可以看一下電視嗎？"}, {"who": "npc", "en": "Sure, but only for half an hour.", "zh": "可以，但只能看半小時。"}, {"who": "you", "en": "Can I play a game on the tablet after that?", "zh": "看完後我可以在平板上玩遊戲嗎？"}, {"who": "npc", "en": "You've already had a lot of screen time today.", "zh": "你今天看螢幕的時間已經很多了。"}, {"who": "you", "en": "Please, just one more game?", "zh": "拜託嘛，就再玩一場？"}, {"who": "npc", "en": "Okay, one game, then it's time to turn it off.", "zh": "好吧，玩一場，然後就該關掉了。"}, {"who": "you", "en": "Can I have five more minutes?", "zh": "我可以再五分鐘嗎？"}, {"who": "npc", "en": "No, time's up. It's almost bedtime.", "zh": "不行，時間到了，快到睡覺時間了。"}, {"who": "you", "en": "Okay, I'll put the tablet away now.", "zh": "好啦，我現在把平板收起來。"}, {"who": "npc", "en": "Good job. Now go brush your teeth.", "zh": "很棒。現在去刷牙吧。"}]}, "country": "US"}, {"id": "bedtime", "icon": "🛏️", "title": "睡前時間", "titleEn": "Bedtime", "desc": "晚上該睡覺時，刷牙、講故事、道晚安會用到", "words": [{"en": "bed", "zh": "床", "ico": "🛏️"}, {"en": "sleepy", "zh": "想睡的", "ico": "😴"}, {"en": "toothbrush", "zh": "牙刷", "ico": "🪥"}, {"en": "pajamas", "zh": "睡衣", "ico": "👕"}, {"en": "story", "zh": "故事", "ico": "📖"}, {"en": "pillow", "zh": "枕頭", "ico": "🛌"}, {"en": "light", "zh": "燈", "ico": "💡"}, {"en": "dream", "zh": "夢", "ico": "💭"}], "patterns": [{"en": "Can I have ___?", "zh": "我可以要___嗎？", "slots": ["one more story", "a glass of water", "five more minutes"]}, {"en": "It's time to ___.", "zh": "該___了。", "slots": ["go to bed", "brush your teeth", "turn off the light"]}], "phrases": [{"en": "It's time for bed.", "zh": "該睡覺了。", "tag": "提醒", "level": 1, "survival": true, "homophone": "一此 太姆 佛 貝得。"}, {"en": "I'm not sleepy yet.", "zh": "我還不想睡。", "tag": "回應", "level": 1, "survival": true, "homophone": "愛姆 那特 斯利批 耶特。"}, {"en": "Good night, Dad.", "zh": "晚安，爸爸。", "tag": "道晚安", "level": 1, "survival": true, "homophone": "古得 耐特，爹地。"}, {"en": "Did you brush your teeth?", "zh": "你刷牙了嗎？", "tag": "刷牙", "level": 1, "survival": false, "homophone": "低啾 布拉許 幼兒 提斯？"}, {"en": "Can you read me a story?", "zh": "你可以講故事給我聽嗎？", "tag": "請求", "level": 1, "survival": false, "homophone": "肯 優 瑞得 米 阿 斯多瑞？"}, {"en": "Just five more minutes, please.", "zh": "拜託再五分鐘就好。", "tag": "請求", "level": 1, "survival": false, "homophone": "賈斯特 法伊夫 摩爾 迷你此，普利斯。"}, {"en": "Please put on your pajamas.", "zh": "請把睡衣穿上。", "tag": "準備", "level": 1, "survival": false, "homophone": "普利斯 舖特 暗 幼兒 帕假馬斯。"}, {"en": "Can I have a glass of water?", "zh": "我可以喝一杯水嗎？", "tag": "請求", "level": 2, "survival": false, "homophone": "肯 愛 黑夫 阿 葛拉斯 歐夫 挖特兒？"}, {"en": "Can you leave the light on?", "zh": "你可以把燈留著開嗎？", "tag": "請求", "level": 1, "survival": false}, {"en": "I'm scared of the dark.", "zh": "我怕黑。", "tag": "感受", "level": 1, "survival": false}, {"en": "Sweet dreams, see you in the morning.", "zh": "祝你好夢，早上見。", "tag": "道晚安", "level": 2, "survival": false}, {"en": "Let me tuck you in and turn off the light.", "zh": "我幫你蓋好被子再關燈。", "tag": "關燈", "level": 2, "survival": false}], "dialogue": {"title": "睡前時間 情境對話", "youRole": "孩子", "npcRole": "爸爸", "lines": [{"who": "you", "en": "Dad, do I have to go to bed now?", "zh": "爸爸，我現在一定要睡覺嗎？"}, {"who": "npc", "en": "Yes, it's already nine o'clock. It's time for bed.", "zh": "對，已經九點了。該睡覺了。"}, {"who": "you", "en": "But I'm not sleepy yet. Can I have one more story?", "zh": "可是我還不想睡。可以再講一個故事嗎？"}, {"who": "npc", "en": "Okay, one short story. Did you brush your teeth?", "zh": "好吧，一個短的故事。你刷牙了嗎？"}, {"who": "you", "en": "Yes, I brushed them and put on my pajamas.", "zh": "刷了，我也換好睡衣了。"}, {"who": "npc", "en": "Good boy. Get into bed and I'll read to you.", "zh": "好孩子。上床吧，我念給你聽。"}, {"who": "you", "en": "Can you leave the light on? I'm a little scared of the dark.", "zh": "你可以把燈留著開嗎？我有點怕黑。"}, {"who": "npc", "en": "Sure, I'll leave the small lamp on for you.", "zh": "當然，我幫你留一盞小燈。"}, {"who": "you", "en": "Thanks, Dad. Good night.", "zh": "謝謝爸爸。晚安。"}, {"who": "npc", "en": "Good night. Sweet dreams, see you in the morning.", "zh": "晚安。祝你好夢，早上見。"}]}, "country": "US"}, {"id": "feeling-sick", "icon": "🤒", "title": "生病不舒服", "titleEn": "Feeling Sick", "desc": "在家覺得不舒服、發燒頭痛時跟家人說的話", "words": [{"en": "sick", "zh": "生病的", "ico": "🤒"}, {"en": "fever", "zh": "發燒", "ico": "🌡️"}, {"en": "headache", "zh": "頭痛", "ico": "🤕"}, {"en": "stomachache", "zh": "肚子痛", "ico": "🤢"}, {"en": "medicine", "zh": "藥", "ico": "💊"}, {"en": "rest", "zh": "休息", "ico": "🛌"}, {"en": "tired", "zh": "疲倦的", "ico": "😪"}, {"en": "cold", "zh": "感冒", "ico": "🤧"}], "patterns": [{"en": "I have a ___.", "zh": "我有點___。", "slots": ["headache", "stomachache", "fever"]}, {"en": "I feel ___.", "zh": "我覺得___。", "slots": ["sick", "cold", "dizzy"]}], "phrases": [{"en": "Mom, I don't feel well.", "zh": "媽，我覺得不太舒服。", "tag": "求助", "level": 1, "survival": true, "homophone": "媽，愛 動特 非爾 威爾。"}, {"en": "I feel sick.", "zh": "我不舒服。", "tag": "求助", "level": 1, "survival": true, "homophone": "愛 非爾 系克。"}, {"en": "My head hurts.", "zh": "我頭好痛。", "tag": "症狀", "level": 1, "survival": true, "homophone": "買 黑得 賀兒此。"}, {"en": "My tummy hurts.", "zh": "我肚子好痛。", "tag": "症狀", "level": 1, "survival": false, "homophone": "買 他米 賀兒此。"}, {"en": "I think I have a fever.", "zh": "我覺得我發燒了。", "tag": "症狀", "level": 1, "survival": false, "homophone": "愛 施因克 愛 黑夫 阿 費佛兒。"}, {"en": "I feel really tired.", "zh": "我覺得好累。", "tag": "症狀", "level": 1, "survival": false, "homophone": "愛 非爾 瑞兒理 太兒得。"}, {"en": "Can you check my temperature?", "zh": "你可以幫我量體溫嗎？", "tag": "請求", "level": 1, "survival": false, "homophone": "肯 優 切克 買 天普拉恰兒？"}, {"en": "I don't want to eat anything.", "zh": "我什麼都不想吃。", "tag": "回應", "level": 1, "survival": false, "homophone": "愛 動特 王特 特 依特 安尼施因。"}, {"en": "Do I have to take medicine?", "zh": "我一定要吃藥嗎？", "tag": "詢問", "level": 1, "survival": false}, {"en": "I've had a headache since this morning.", "zh": "我從早上就一直頭痛。", "tag": "症狀", "level": 2, "survival": false}, {"en": "I think I just need some rest.", "zh": "我想我只是需要休息一下。", "tag": "回應", "level": 2, "survival": false}, {"en": "Can I stay in bed a little longer?", "zh": "我可以在床上多躺一下嗎？", "tag": "請求", "level": 2, "survival": false}], "dialogue": {"title": "生病不舒服 情境對話", "youRole": "孩子", "npcRole": "媽媽", "lines": [{"who": "you", "en": "Mom, I don't feel well.", "zh": "媽，我覺得不太舒服。"}, {"who": "npc", "en": "Oh no, what's wrong, sweetie?", "zh": "喔不，怎麼了，寶貝？"}, {"who": "you", "en": "My head hurts and I feel really hot.", "zh": "我頭好痛，而且覺得好熱。"}, {"who": "npc", "en": "Let me check your temperature.", "zh": "我來幫你量一下體溫。"}, {"who": "you", "en": "Do I have a fever?", "zh": "我發燒了嗎？"}, {"who": "npc", "en": "Yes, a little. You should take some medicine.", "zh": "對，有一點。你應該吃點藥。"}, {"who": "you", "en": "Okay. Can I stay home today?", "zh": "好。我今天可以待在家嗎？"}, {"who": "npc", "en": "Of course. Just rest and drink lots of water.", "zh": "當然可以。好好休息，多喝水。"}, {"who": "you", "en": "Thanks, Mom. I'm going to lie down.", "zh": "謝謝媽媽。我要去躺一下。"}, {"who": "npc", "en": "Good. Call me if you need anything.", "zh": "好。需要什麼就叫我。"}]}, "country": "US"}, {"id": "phone-call", "icon": "📞", "title": "講電話視訊", "titleEn": "Phone & Video Calls", "desc": "打電話或視訊給家人朋友，接聽、轉達與掛斷都用得到", "words": [{"en": "call", "zh": "電話；打電話", "ico": "📞"}, {"en": "phone", "zh": "手機", "ico": "📱"}, {"en": "video call", "zh": "視訊通話", "ico": "📹"}, {"en": "answer", "zh": "接聽", "ico": "✅"}, {"en": "hang up", "zh": "掛電話", "ico": "🔚"}, {"en": "signal", "zh": "訊號", "ico": "📶"}, {"en": "sound", "zh": "聲音", "ico": "🔊"}, {"en": "message", "zh": "訊息", "ico": "💬"}], "patterns": [{"en": "Can you hear ___?", "zh": "你聽得到___嗎？", "slots": ["me", "us", "the sound"]}, {"en": "I'll call you ___.", "zh": "我___打給你。", "slots": ["back", "later", "tonight"]}], "phrases": [{"en": "Hello?", "zh": "喂？", "tag": "接電話", "level": 1, "survival": true, "homophone": "哈囉？"}, {"en": "Who's calling, please?", "zh": "請問是哪位？", "tag": "詢問", "level": 1, "survival": true, "homophone": "護資 卡令，普利斯？"}, {"en": "Can you hear me?", "zh": "你聽得到我說話嗎？", "tag": "確認", "level": 1, "survival": true, "homophone": "肯 優 喝爾 米？"}, {"en": "It's me, Grandma.", "zh": "阿嬤，是我啦。", "tag": "表明", "level": 1, "survival": false, "homophone": "一此 米，葛蘭媽。"}, {"en": "Hold on a second, please.", "zh": "請稍等一下。", "tag": "請求", "level": 1, "survival": false, "homophone": "齁得 暗 阿 誰肯得，普利斯。"}, {"en": "The signal is bad here.", "zh": "這裡訊號不太好。", "tag": "回應", "level": 1, "survival": false, "homophone": "責 系 const SCENARIOS = window.__SCENARIOS__;
const REF = window.__REF__;

const fmt=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const todayStr=()=>fmt(new Date());

const BANDS={
  all:{name:"一般",emoji:"🙂",desc:"全部關卡與難度",levels:[1,2,3],hide:[],big:false,homo:false},
  senior:{name:"長輩",emoji:"👵",desc:"只留最基礎救命句、大字、諧音發音",levels:[1],hide:[],big:true,homo:true},

};
function band(){return BANDS[S.band]||BANDS.all}
function scenList(){return SCENARIOS.filter(sc=>!band().hide.includes(sc.id))}
function phraseOK(p){return band().levels.includes(p.level||2)||p.survival}
function visPhrases(sc){return sc.phrases.map((p,i)=>({p,i})).filter(o=>phraseOK(o.p))}

let S;
function pKey(id){return 'family_en_'+id}
function loadProfile(id){
  S = JSON.parse(localStorage.getItem(pKey(id))||'null') || {};
  S.cards=S.cards||{}; S.favs=S.favs||[]; S.streakDates=S.streakDates||[]; S.dailyCount=S.dailyCount||{};

  S.wrong=S.wrong||{}; S.finals=S.finals||{};
}
function saveS(){localStorage.setItem(pKey(G.current),JSON.stringify(S))}

function cardKey(sid,i){return sid+'#'+i}
function getCard(sid,i){const k=cardKey(sid,i);return S.cards[k]||(S.cards[k]={lvl:0,due:0,seen:0})}
const SRS_DAYS=[0,1,2,4,8,16,30];
function grade(sid,i,ok){
  const c=getCard(sid,i);c.seen++;
  if(ok){c.lvl=Math.min(6,c.lvl+1);c.due=Date.now()+SRS_DAYS[c.lvl]*864e5;}
  else{c.lvl=Math.max(0,c.lvl-1);c.due=Date.now()+6e5;}
  markWrong(sid,i,ok);
  countStudy();saveS();
}

/* ===== 📝 錯題本（比照 [[國中2000]] 的做法）=====
   原本答錯只是把 SRS 降一級、10 分鐘後再到期 —— 等於「錯過」這件事沒被單獨記住，
   孩子也看不到自己到底哪些句子一直卡住。
   2000 的兩條原則照抄：
   ① 錯題複習「不能用選的」——用選的會蒙混過去 → 先翻卡看提示，再動手拼一次才算
   ② 連對 2 次、而且要跨輪（有間隔）才畢業，不是當場連對兩次就算會
   WBOX 用分鐘：答錯後 10 分鐘可再練，之後 1 天、3 天。 */
const WBOX_MIN=[10,1440,4320];
function markWrong(sid,i,ok){
  const k=cardKey(sid,i),w=S.wrong[k];
  if(!ok){
    const e=w||{n:0,streak:0,first:Date.now()};
    e.n++;e.streak=0;e.box=0;e.due=Date.now()+WBOX_MIN[0]*6e4;e.ts=Date.now();
    S.wrong[k]=e;return;
  }
  if(!w)return;                                  // 沒錯過就不用畢業
  // 跨輪才算數：同一輪內連對兩次不算（due 還沒到就不推進 streak）
  if(Date.now()<(w.due||0))return;
  w.streak=(w.streak||0)+1;w.ts=Date.now();
  if(w.streak>=2){delete S.wrong[k];return}       // 連對 2 次且跨輪 → 畢業
  w.box=Math.min((w.box||0)+1,WBOX_MIN.length-1);
  w.due=Date.now()+WBOX_MIN[w.box]*6e4;
}
function wrongList(){
  const out=[];
  scenList().forEach(sc=>visPhrases(sc).forEach(o=>{
    const w=S.wrong[cardKey(sc.id,o.i)];if(w)out.push({sc,p:o.p,i:o.i,w});
  }));
  return out;
}
function wrongDue(){const n=Date.now();return wrongList().filter(x=>(x.w.due||0)<=n)}
/* 錯題複習：一律 scramble（拼句）＝唯一真的要產出的模式。
   ⚠️ listen 與 translate 都是四選一，用選的會蒙混過去（2000 就是為此把錯題本改掉的）。
   peek＝先翻卡看提示再拼，比照 2000 的「先翻卡 → 動手拼一次才算」。 */
function startWrongReview(){
  const act=wrongList();
  if(!act.length){toast('沒有錯題，很棒 🎉');return}
  const due=wrongDue(),pool=due.length?due:act;
  const items=shuffle(pool.map(o=>Object.assign({},o,{mode:'scramble',peek:true})));
  Q={mode:'scramble',items,idx:0,correct:0,sid:null,wrongbook:true};
  renderCard();
}
function countStudy(){const t=todayStr();S.dailyCount[t]=(S.dailyCount[t]||0)+1;if(!S.streakDates.includes(t))S.streakDates.push(t);}
function freezeAvailable(){return !S.lastFreeze || (Date.now()-S.lastFreeze)>=7*864e5;}
function canRescueStreak(){return streakRaw()===0 && (S.streakDates||[]).length>0 && freezeAvailable();}
function useFreeze(){
  if(!freezeAvailable()){toast('補打卡每週只能用一次 🛡️');return;}
  S.frozenDates=S.frozenDates||[];
  const d=new Date();d.setDate(d.getDate()-1);const y=fmt(d);
  if(!S.streakDates.includes(y)&&!S.frozenDates.includes(y))S.frozenDates.push(y);
  S.lastFreeze=Date.now();saveS();renderHome();toast('🛡️ 已補回昨天，連續紀錄保住了！');
}
function streakRaw(){
  const set=new Set(S.streakDates);let n=0;const d=new Date();let key=todayStr();
  if(!set.has(key)){d.setDate(d.getDate()-1);key=fmt(d);if(!set.has(key))return 0;}
  while(set.has(key)){n++;d.setDate(d.getDate()-1);key=fmt(d);}
  return n;
}
function streak(){
  const set=new Set([...(S.streakDates||[]),...(S.frozenDates||[])]);let n=0;const d=new Date();let key=todayStr();
  if(!set.has(key)){d.setDate(d.getDate()-1);key=fmt(d);if(!set.has(key))return 0;}
  while(set.has(key)){n++;d.setDate(d.getDate()-1);key=fmt(d);}
  return n;
}
function totalStars(){let s=0;for(const k in S.cards)s+=S.cards[k].lvl;return s}
function dueCards(){
  const now=Date.now();const out=[];
  scenList().forEach(sc=>visPhrases(sc).forEach(o=>{const c=S.cards[cardKey(sc.id,o.i)];if(c&&c.seen>0&&c.due<=now)out.push({sc,p:o.p,i:o.i});}));
  return out;
}
function scenarioPct(sc){
  const vis=visPhrases(sc);if(!vis.length)return 0;
  let done=0;vis.forEach(o=>{const c=S.cards[cardKey(sc.id,o.i)];if(c&&c.lvl>=3)done++;});
  return Math.round(done/vis.length*100);
}

let voice=null;
function pickVoice(){const vs=speechSynthesis.getVoices();
  voice=vs.find(v=>/en[-_]US/i.test(v.lang)&&/female|samantha|zira|aria|jenny/i.test(v.name))||vs.find(v=>/en[-_]US/i.test(v.lang))||vs.find(v=>/^en/i.test(v.lang))||null;}
if('speechSynthesis'in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function say(text,rate){

  speechSynthesis.cancel();

const STICKER_POOL=['🐶','🐱','🦄','🐼','🦁','🐸','🐙','🦖','🌈','⭐','🍦','🎈','🚀','🐧','🦉','🐢','🌸','🍩','🐳','🦋'];
let KG=null;
function allKidWords(){const a=[];SCENARIOS.forEach(sc=>(sc.words||[]).forEach(w=>{if(w.ico)a.push(w)}));return a;}
function scHasKidGame(sc){return (sc.words||[]).filter(w=>w.ico).length>=1;}
function startKidGame(){
  const pool=(curScenario.words||[]).filter(w=>w.ico);
  if(!pool.length){toast('這關暫無圖卡遊戲');return;}
  KG={sc:curScenario,items:shuffle(pool.slice()),idx:0,correct:0,rounds:Math.min(pool.length,8)};
  drawKidGame();
}
function drawKidGame(){
  if(KG.idx>=KG.rounds){finishKidGame();return;}
  const target=KG.items[KG.idx];
  const others=shuffle(allKidWords().filter(w=>w.ico!==target.ico&&w.en!==target.en)).slice(0,3);
  const opts=shuffle([target,...others]);
  const pct=Math.round(KG.idx/KG.rounds*100);
  const grid=opts.map(o=>`<button class="kgopt" onclick="kidPick(this,${o.en===target.en?1:0})"><div class="kgico">${o.ico}</div><div class="kgzh">${o.zh}</div></button>`).join('');
  const inner=`<div style="text-align:center;margin:8px 0 4px"><button class="mic" style="width:76px;height:76px;font-size:32px;margin:0 auto" onclick="say(${esc(target.en)})">🔊</button><div class="qsub" style="margin-top:10px;font-size:1rem">聽聲音，點出對的圖！</div></div><div class="kggrid">${grid}</div>`;
  $('#overlayMount').innerHTML=`<div class="overlay"><div class="ovhead"><button class="x" onclick="KG=null;closeOverlay()">✕</button><div class="ovprog"><i style="width:${pct}%"></i></div><div class="cnt">🎮 ${KG.idx+1}/${KG.rounds}</div></div><div class="ovbody">${inner}</div><div class="ovfoot"></div></div>`;
  setTimeout(()=>say(target.en),250);
}
function kidPick(el,correct){
  if(el.disabled||el.parentElement.dataset.done)return;
  if(correct){el.classList.add('kgok');el.parentElement.dataset.done=1;KG.correct++;confetti();heart(el);countStudy();saveS();
    setTimeout(()=>{KG.idx++;drawKidGame();},650);
  }else{el.classList.add('kgbad');el.disabled=true;el.style.opacity=.4;}
}

  S.stickers=S.stickers||[];

}

/* ===== 📚 總複習：跨情境混合驗收 =====
   上面那個「複習」只出「到期的卡」而且只考 listen ＝ 只考認得出來。
   跨情境加權抽題（越不熟越常出），80% 才算過關。

   ⚠️ 模式怎麼挑，這裡有個坑：這支 App 的「✍️ 中翻英」(cardTranslate) 掛著寫字的圖示，
      骨子裡卻是 makeOptions 四選一 —— 跟 listen 一樣可以用猜的。
      真正要產出的只有 scramble（拼句）。
   比照國中2000 的複習原則（那邊克漏字＋拼字全是產出、錯題「用選的會蒙混過去」）：
   這裡以 scramble 為主（2/3），只留 1/3 listen —— 因為「聽得懂」是會話 App 真正要的能力，
   沒辦法用產出去測。translate 不放：它跟 listen 同樣是選擇題，多放只是多開一條摸魚路。
   shadow(跟讀) 也不放——要麥克風，裝置不給權限就整場卡死。 */
const F_MODES=['scramble','listen','scramble'];
const F_PASS=80;
function fPool(){const out=[];scenList().forEach(sc=>visPhrases(sc).forEach(o=>out.push({sc,p:o.p,i:o.i})));return out}
function fScopes(){
  const all=fPool(),surv=all.filter(o=>o.p.survival),out=[];
  if(surv.length>=8)out.push({k:'surv',name:'🆘 救命句總複習',sub:'最該脫口而出的那些',pool:surv,n:Math.min(20,surv.length)});
  out.push({k:'all',name:'📚 全情境總複習',sub:scenList().length+' 個情境混合',pool:all,n:Math.min(30,all.length)});
  return out;
}
function fWeight(o){                       // 越不熟越常出
  const c=S.cards[cardKey(o.sc.id,o.i)];let w=1;
  if(!c||!c.seen)w+=1.5;                   // 還沒練過
  else{if(c.lvl<3)w+=1.0;if(c.lvl>=5)w-=0.5;if(c.due<=Date.now())w+=0.8;}
  if(o.p.survival)w+=0.3;                  // 救命句多練一點
  return Math.max(0.3,w);
}
function fSample(pool,n){                  // 加權、不重複
  const src=pool.slice(),out=[];
  while(out.length<n&&src.length){
    let tot=0;src.forEach(o=>tot+=fWeight(o));
    let r=Math.random()*tot,k=0;
    for(;k<src.length;k++){r-=fWeight(src[k]);if(r<=0)break}
    out.push(src.splice(Math.min(k,src.length-1),1)[0]);
  }
  return out;
}
function fScopeCard(){
  const done=S.finals||{};
  return fScopes().map(s=>{const r=done[s.k]||{};
    return `<button class="mode" onclick="startFinalReview('${s.k}')" style="text-align:left">
      <div class="mi">${r.passed?'🏆':'📚'}</div>
      <div class="ml">${s.name.replace(/^\S+\s/,'')}<small style="display:block;opacity:.7">${s.sub} · ${s.n} 題${r.best?' · 最佳 '+r.best+'%':''}</small></div>
    </button>`}).join('');
}
function startFinalReview(k){
  const sc=fScopes().find(s=>s.k===k);if(!sc)return;
  const picked=fSample(sc.pool,sc.n);
  if(picked.length<5){toast('先去情境裡練幾句，總複習才有東西考 📚');return}
  // 三種模式輪流分配後再洗牌 → 交錯，不讓他靠「這頁都是聽力」猜
  const items=shuffle(picked.map((o,idx)=>Object.assign({},o,{mode:F_MODES[idx%F_MODES.length]})));
  Q={mode:'listen',items,idx:0,correct:0,sid:null,final:sc};
  renderCard();
}

  $('#overlayMount').innerHTML=ovShell(inner,'');

function makeOptions(p,field){
  // 優先用「同一情境」的句子當誘答，比較像、比較難猜；不足再用全體補
  const same=shuffle((curScenario?curScenario.phrases:[]).filter(x=>x[field]&&x[field]!==p[field]));
  const wrong=same.slice(0,3);
  if(wrong.length<3){
    const all=[];SCENARIOS.forEach(sc=>sc.phrases.forEach(x=>all.push(x)));
    const extra=shuffle(all.filter(x=>x[field]&&x[field]!==p[field]&&!wrong.includes(x))).slice(0,3-wrong.length);
    wrong.push(...extra);
  }
  return shuffle([{text:p[field],correct:true},...wrong.map(w=>({text:w[field],correct:false}))]);
}
function pickOpt(el,correct){
  if(el.parentElement.dataset.done)return;el.parentElement.dataset.done=1;
  const cur=Q.items[Q.idx];const field=Q.mode==='listen'?'zh':'en';
  [...el.parentElement.children].forEach(b=>b.style.pointerEvents='none');
  if(correct){el.classList.add('ok');Q.correct++;grade(cur.sc.id,cur.i,true);say(cur.p.en);
    setTimeout(()=>{Q.idx++;renderCard()},750);
  }else{
    el.classList.add('no');grade(cur.sc.id,cur.i,false);
    const target=Q.mode==='dictation'?el.parentElement.querySelector('.opt'):null;
    [...el.parentElement.children].forEach(b=>{if(b.textContent===cur.p[field])b.classList.add('ok')});
    showTeach(cur,el.textContent);say(cur.p.en);
  }
}
function showTeach(cur,youAnswer){

function extractNum(en){const m=en.match(NUMRE);return m?m[0]:null;}
function cardDictation(){
  const{p}=Q.items[Q.idx];const num=extractNum(p.en)||'';
  const masked=p.en.replace(num,'＿＿＿');
  const distract=shuffle(['2','5','10','12','20','30','50','100','half past ten','four','noon','midnight'].filter(x=>x.toLowerCase()!==num.toLowerCase())).slice(0,3);
  const opts=shuffle([{text:num,correct:true},...distract.map(d=>({text:d,correct:false}))]);
  const inner=`<div style="text-align:center;margin:14px 0"><button class="mic" style="width:70px;height:70px;font-size:28px;margin:0 auto" onclick="say(${esc(p.en)})">🔊</button><div class="qsub" style="margin-top:14px">聽句子，選出你聽到的數字/時間</div></div>
    <div class="qword" style="font-size:1.15rem;color:var(--sub)">${masked}</div>
    <div id="opts" style="margin-top:10px">${opts.map(o=>`<button class="opt" style="text-align:center" onclick="pickOpt(this,${o.correct})">${o.text}</button>`).join('')}</div>`;
  $('#overlayMount').innerHTML=ovShell(inner,'');say(p.en);
}

let scz={};
function cardScramble(){
  const it=Q.items[Q.idx],p=it.p;
  // 錯題本：先翻卡看提示（他本來就答錯過，直接叫他拼是刁難），看完再動手拼一次才算。
  // 比照國中2000 的錯題本做法。看提示不影響判分——拼不出來一樣是錯。
  if(it.peek&&!it._peeked)return drawPeek(it,p);
  const words=p.en.replace(/([.,!?;])/g,' $1').split(/\s+/).filter(Boolean);
  scz={words,target:[],pool:shuffle(words.map((w,idx)=>({w,idx})))};drawScramble(p);
}
function drawPeek(it,p){
  const showHomo=(band().homo||p.survival)&&p.homophone;
  const inner=`<div class="flash"><div class="card3d">
      <div class="qsub" style="margin-bottom:8px">📝 這句你之前拼錯過 —— 先看清楚，等一下要自己拼一次</div>
      <div class="big-en">${p.en}</div>
      <div class="big-zh">${p.zh}</div>
      ${showHomo?`<div class="homo">${p.homophone}</div>`:''}
      <div class="tapkuce" style="margin-top:6px">${it.sc.icon} ${it.sc.title}</div>
    </div>
    <button class="speak" onclick="say(${esc(p.en)})">🔊 播放發音</button></div>`;
  $('#overlayMount').innerHTML=ovShell(inner,`<button class="pbtn" onclick="peekDone()">看好了，開始拼 🧩</button>`);
  say(p.en);
}
function peekDone(){Q.items[Q.idx]._peeked=1;renderCard();}
function drawScramble(p){
  const inner=`<div class="qsub" style="margin-top:6px">把單字排成正確的英文句子</div>
    <div class="qword" style="font-size:1.15rem;color:var(--sub);margin:4px 0 14px">${p.zh}</div>
    <div class="scz-target" id="sczT">${scz.target.map((t,k)=>`<button class="tok" onclick="sczBack(${k})">${t.w}</button>`).join('')||'<span style="color:var(--sub);align-self:center">👇 從下方點選單字</span>'}</div>
    <div class="scz-pool" id="sczP">${scz.pool.map((t,k)=>`<button class="tok inpool" onclick="sczPick(${k})">${t.w}</button>`).join('')}</div>`;
  $('#overlayMount').innerHTML=ovShell(inner,`<button class="pbtn ghost" onclick="say(${esc(p.en)})">🔊 提示</button><button class="pbtn" onclick="sczCheck()" ${scz.pool.length?'disabled':''}>檢查</button>`);
}
function sczPick(k){scz.target.push(scz.pool.splice(k,1)[0]);drawScramble(Q.items[Q.idx].p);}
function sczBack(k){scz.pool.push(scz.target.splice(k,1)[0]);drawScramble(Q.items[Q.idx].p);}
function sczCheck(){
  const cur=Q.items[Q.idx];const correct=scz.target.map(t=>t.w).join(' ')===scz.words.join(' ');const T=$('#sczT');
  if(correct){T.classList.add('ok');Q.correct++;grade(cur.sc.id,cur.i,true);say(cur.p.en);setTimeout(()=>{Q.idx++;renderCard()},900);}
  else{T.classList.add('err');grade(cur.sc.id,cur.i,false);setTimeout(()=>T.classList.remove('err'),400);
    setTimeout(()=>{$('#ovbody').insertAdjacentHTML('beforeend',`<div class="teach"><div class="r right">✓ 正解：${cur.p.en}</div><div style="font-size:.85rem;color:var(--sub);margin-top:3px">${cur.p.zh}</div>${cur.p.tip?`<div class="tipbox">💡 ${cur.p.tip}</div>`:''}</div>`);$('#ovfoot').innerHTML=`<button class="pbtn ghost" onclick="say(${esc(cur.p.en)})">🔊 聽</button><button class="pbtn" onclick="Q.idx++;renderCard()">下一題 ›</button>`;$('#ovbody').scrollTop=9e9;},450);}
}

let recog=null,recSupported=('webkitSpeechRecognition'in window)||('SpeechRecognition'in window);
function cardShadow(){
  const{p}=Q.items[Q.idx];

function toggleRec(){
  if(!recSupported)return;const R=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(recog){recog.stop();return;}
  recog=new R();recog.lang='en-US';recog.interimResults=false;recog.maxAlternatives=1;
  $('#micBtn').classList.add('rec');$('#heard').textContent='🔴 聽你說…請開口';
  recog.onresult=e=>scoreShadow(e.results[0][0].transcript);
  recog.onerror=()=>{$('#heard').textContent='沒聽清楚，再試一次';};
  recog.onend=()=>{const m=$('#micBtn');if(m)m.classList.remove('rec');recog=null;};
  try{recog.start();}catch(e){}
}
function normalize(s){return s.toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim()}
function scoreShadow(said){
  const cur=Q.items[Q.idx];const tw=normalize(cur.p.en).split(' '),hw=new Set(normalize(said).split(' '));
  let hit=0;tw.forEach(w=>{if(hw.has(w))hit++});const score=Math.round(hit/tw.length*100);
  // 逐字標記：綠＝機器聽到了、紅波浪＝沒聽到（可點聽慢速）
  const marked=cur.p.en.split(/(\s+)/).map(tok=>{const w=normalize(tok);if(!w)return tok;return hw.has(w)?`<span class="wok">${tok}</span>`:`<span class="wmiss">${tok}</span>`;}).join('');
  const missed=tw.filter(w=>!hw.has(w));
  $('#heard').innerHTML=`辨識到：<b>${said}</b>`;
  const cls=score>=80?'w-good':score>=50?'w-mid':'w-bad';
  const msg=score>=80?'這句大部分字都聽清楚了 🎉':'紅字是機器沒聽到的，點一下聽慢速、再唸一次：';
  const chips=(score<80&&missed.length)?missed.map(w=>`<button class="misschip" onclick="say('${w}')">🔊 ${w}</button>`).join(''):'';
  $('#scoreArea').innerHTML=`<div class="shadowline">${marked}</div>`+
    `<div class="scorebig ${cls}">${score}<span style="font-size:1.05rem"> % 字被聽到</span></div>`+
    `<div class="qsub">${msg}${chips}</div>`+
    `<div class="fbnote">※ 這是「單字有沒有被聽到」的比例，不是發音準不準的評分。想聽真人示範可點下方「範例」。</div>`;
  const ok=score>=60;grade(cur.sc.id,cur.i,ok);if(ok)Q.correct++;if(score>=80)heart($('#micBtn'));
  $('#ovfoot').innerHTML=`<button class="pbtn ghost" onclick="say(${esc(cur.p.en)})">🔊 範例</button><button class="pbtn" onclick="Q.idx++;renderCard()">下一題 ›</button>`;
}

let RP=null;
function pickLine(l){if(l.who==='npc'&&l.alt&&l.alt.length&&Math.random()<0.5){const a=l.alt[Math.floor(Math.random()*l.alt.length)];return{who:'npc',en:a.en,zh:a.zh};}return l;}
function startRoleplay(){
  const d=curScenario.dialogue;if(!d||!d.lines||!d.lines.length){toast('這關暫無對話');return}
  RP={d,step:0,resolved:d.lines.map(pickLine)};drawRoleplay();
}
function drawRoleplay(){
  const{d,resolved}=RP;const shown=resolved.slice(0,RP.step);
  const chat=shown.map(l=>`<div class="bubble ${l.who}">${l.en}<div class="z">${l.zh}</div></div>`).join('');
  let foot='',bottom='';
  if(RP.step>=resolved.length){foot=`<button class="pbtn ghost" onclick="closeOverlay()">完成</button><button class="pbtn" onclick="RP.step=0;RP.resolved=RP.d.lines.map(pickLine);drawRoleplay()">再玩一次</button>`;}
  else{const nxt=resolved[RP.step];
    if(nxt.who==='you'){bottom=`<div class="roleask">👉 換你了（你扮演：${d.youRole}）— ${recSupported?'先點麥克風把這句「說出來」，再看解答':'先自己念出來，再看解答'}</div>${recSupported?`<div style="text-align:center;margin-top:10px"><button class="mic" style="width:66px;height:66px;font-size:27px;margin:0 auto" id="rpMic" onclick="rpSpeak()">🎤</button><div class="heard" id="rpHeard">點麥克風開口說</div><div id="rpFb"></div></div>`:''}`;foot=`<button class="pbtn ghost" onclick="say(${esc(nxt.en)})">🔊 提示</button><button class="pbtn" onclick="rpAdvance()">看解答 ›</button>`;}
    else{bottom=`<div class="roleask">🗣️ ${d.npcRole} 說話中…</div>`;foot=`<button class="pbtn" onclick="rpAdvance()">繼續 ›</button>`;}}
  const inner=`<div style="text-align:center;margin-bottom:6px"><b>${d.title}</b><div class="qsub">你：${d.youRole} ｜ 對方：${d.npcRole}</div></div><div class="chat">${chat||'<div class="qsub">點「繼續」展開對話</div>'}</div>${bottom}`;
  $('#overlayMount').innerHTML=`<div class="overlay"><div class="ovhead"><button class="x" onclick="closeOverlay()">✕</button><div class="ovprog"><i style="width:${Math.round(RP.step/resolved.length*100)}%"></i></div><div class="cnt">🎭</div></div><div class="ovbody">${inner}</div><div class="ovfoot">${foot}</div></div>`;
  const last=shown[shown.length-1];if(last&&last.who==='npc')say(last.en);
  const body=$('.chat');if(body)body.scrollTop=body.scrollHeight;
}
function rpAdvance(){const l=RP.resolved[RP.step];RP.step++;if(l.who==='you'){countStudy();saveS();}drawRoleplay();}
function rpSpeak(){
  if(!recSupported)return;const R=window.SpeechRecognition||window.webkitSpeechRecognition;

    const marked=nxt.en.split(/(\s+)/).map(t=>{const w=normalize(t);if(!w)return t;return hw.has(w)?`<span class="wok">${t}</span>`:`<span class="wmiss">${t}</span>`;}).join('');

let RS=null;
function startRespond(){
  const d=curScenario.dialogue;if(!d||!d.lines)return;
  const pairs=[];for(let i=0;i<d.lines.length-1;i++){if(d.lines[i].who==='npc'&&d.lines[i+1].who==='you')pairs.push({npc:d.lines[i],you:d.lines[i+1]});}

function drawRespond(revealed){

  let body=`<div style="flex:1;display:flex;flex-direction:column;gap:14px;justify-content:center">
    <div class="qsub">🗣️ 對方對你說（點播放來聽）：</div>

  if(!revealed){body+=`<div class="roleask">👉 換你回答！${recSupported?'點麥克風說說看':'想好你會怎麼回，再看參考'}</div>
    ${recSupported?`<div style="text-align:center"><button class="mic" style="width:74px;height:74px;font-size:30px;margin:0 auto" id="rsMic" onclick="rsRec()">🎤</button><div class="heard" id="rsHeard"></div></div>`:''}`;}
  else{body+=`<div class="roleask">✅ 參考回答：</div><div class="bubble you" style="max-width:100%;align-self:flex-end">${pr.you.en}<div class="z">${pr.you.zh}</div></div>`;}
  body+='</div>';
  const foot=revealed?`<button class="pbtn ghost" onclick="say(${esc(pr.you.en)})">🔊 聽參考</button><button class="pbtn" onclick="RS.idx++;countStudy();saveS();drawRespond(false)">下一題 ›</button>`
    :`<button class="pbtn" onclick="drawRespond(true)">看參考回答 ›</button>`;

  say(pr.npc.en);

const RS_STOP=new Set('a an the to of for and or i you we it is are am was were be been do does did can could would will shall may my your our me us at in on this that these those with please yes no ok oh so'.split(' '));
function rsRec(){
  if(!recSupported)return;const R=window.SpeechRecognition||window.webkitSpeechRecognition;
  const rr=new R();rr.lang='en-US';rr.interimResults=false;
  $('#rsMic').classList.add('rec');$('#rsHeard').textContent='🔴 聽你說…';
  rr.onresult=e=>{
    const said=e.results[0][0].transcript;const pr=RS.pairs[RS.idx];
    const heard=new Set(normalize(said).split(' '));
    const key=[...new Set(normalize(pr.you.en).split(' '))].filter(w=>w&&!RS_STOP.has(w));
    const covered=key.filter(w=>heard.has(w)),missed=key.filter(w=>!heard.has(w));
    const pct=key.length?Math.round(covered.length/key.length*100):100;
    let fb=`辨識到：<b>${said}</b>`;
    if(key.length){
      if(pct>=60)fb+=`<br><span class="keyok">👍 重點都講到了（關鍵字 ${covered.length}/${key.length}）</span>`;
      else fb+=`<br>還差關鍵字：${missed.map(w=>`<span class="wmiss">${w}</span>`).join(' ')}<br><span class="qsub">參考說法：${pr.you.en}</span>`;
    }
    fb+=`<div class="fbnote">※ 只檢查你有沒有講到重點字，不評發音；旅遊講得通最重要，說法不用跟參考一模一樣。</div>`;
    $('#rsHeard').innerHTML=fb;
  };
  rr.onerror=()=>{$('#rsHeard').textContent='沒聽清楚，再試一次';};
  rr.onend=()=>{const m=$('#rsMic');if(m)m.classList.remove('rec');};
  try{rr.start();}catch(e){}
}

function finishSession(){
  const total=Q.items.length,correct=Q.correct,pct=total?Math.round(correct/total*100):0;
  if(Q.final)return finishFinal(pct,correct,total);
  const star=pct>=90?'🏆':pct>=70?'🌟':'👍';confetti();
  const inner=`<div class="flash"><div style="font-size:64px">${star}</div><div class="big-en">完成！</div>

    <div style="font-size:.95rem;color:var(--sub)">今日累積 <b style="color:var(--sky)">${S.dailyCount[todayStr()]||0}</b> 張 · 連續 <b style="color:var(--gold)">${streak()}</b> 天 🔥</div></div></div>`;

function finishFinal(pct,correct,total){

  S.finals[sc.k]={passed:pr.passed||pass,best:Math.max(pr.best||0,pct),last:pct,ts:Date.now()};saveS();
  // 答錯的集中在哪個情境
  const miss={};Q.items.forEach(o=>{const c=S.cards[cardKey(o.sc.id,o.i)];if(c&&c.lvl<3)miss[o.sc.id]=(miss[o.sc.id]||0)+1});
  const worst=Object.keys(miss).sort((a,b)=>miss[b]-miss[a])[0];
  const ws=worst?SCENARIOS.find(s=>s.id===worst):null;
  const msg=pass?'過關！這些句子你是真的會用了 🎉'
    :pct>=60?'就差一點——把最弱的情境再練一輪就過了。'

    </div></div>`;

}

function ownWrong(){var w=R.wrong(),o=[];for(var k in w){if(w[k].app===MYID)o.push(w[k]);}return o;}
function ownWords(){var v=R.words(),o=[];for(var k in v){if(v[k].app===MYID)o.push(v[k]);}return o;}
function due(a){return a.filter(function(x){return x.due<=NOW;});}

function ov(title,inner){var o=document.createElement('div');o.className='rvc-ov';
  o.innerHTML='<div class=\"rvc-sheet\"><div class=\"rvc-hd\"><h2>'+title+'</h2><button class=\"rvc-x\">✕</button></div><div class=\"rvc-body\">'+inner+'</div></div>';
  o.addEventListener('click',function(e){if(e.target===o)o.remove();});
  o.querySelector('.rvc-x').addEventListener('click',function(){o.remove();refreshFab();});
  document.body.appendChild(o);return o;}

/* ===== 一般 App：只複習自己的 ===== */
function refreshFab(){var fab=document.getElementById('rvcFab');if(!fab)return;
  var dw=due(ownWrong()).length, dv=due(ownWords()).length, tot=dw+dv;
  if(tot>0){fab.style.display='inline-flex';fab.innerHTML='📝 複習<span class=\"bdg\">'+tot+'</span>';}else{fab.style.display='none';}}
function openSelf(){
  var W=ownWrong(),V=ownWords();
  var h='<div class=\"rvc-tab\"><button class=\"on\" data-t=\"w\">📕 錯題 '+W.length+'</button><button data-t=\"v\">📘 生字 '+V.length+'</button></div><div id=\"rvcPane\"></div>';
  var o=ov('📝 我的複習',h);
  var pane=o.querySelector('#rvcPane');
  o.querySelectorAll('.rvc-tab button').forEach(function(b){b.addEventListener('click',function(){o.querySelectorAll('.rvc-tab button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');paint(b.dataset.t);});});
  function paint(t){if(t==='v')paintWords(pane,V,o);else paintWrong(pane,W,o);}
  paint('w');
}
function paintWrong(pane,W,o){
  if(!W.length){pane.innerHTML='<div class=\"rvc-empty\">目前沒有錯題 🎉<br>練習答錯的題目會自動收進這裡。</div>';return;}
  var d=due(W);
  var grp={};W.forEach(function(e){(grp[e.cat||'其他']=grp[e.cat||'其他']||[]).push(e);});
  var h='<button class=\"rvc-primary\" '+(d.length?'':'disabled style=opacity:.5')+' id=\"rvcQz\">▶ 重考待複習錯題（'+d.length+'）</button>';
  Object.keys(grp).forEach(function(g){h+='<div class=\"rvc-grp\">'+esc(g)+'（'+grp[g].length+'）</div>';
    grp[g].forEach(function(e){h+='<div class=\"rvc-item\"><div class=\"rvc-q\">'+esc(e.stem)+'</div><div class=\"rvc-exp\"><b>✅ 正解 '+L[e.ans]+'：</b>'+esc((e.options||[])[e.ans]||'')+'　'+esc(e.expl||'')+'</div></div>';});});
  pane.innerHTML=h;
  var qz=pane.querySelector('#rvcQz');if(qz&&d.length)qz.addEventListener('click',function(){startQuiz(d,o);});
}
function startQuiz(pool,parent){
  parent.remove();var i=0,right=0;var o=ov('📕 重考錯題（'+pool.length+'）','<div id=\"rvcQ\"></div>');
  function draw(){var box=o.querySelector('#rvcQ');if(i>=pool.length){box.innerHTML='<div class=\"rvc-empty\">複習完成！答對 '+right+'/'+pool.length+'<br>連對 2 次的題目會自動畢業 🎓</div><button class=\"rvc-primary\">完成</button>';box.querySelector('button').addEventListener('click',function(){o.remove();refreshFab();});return;}
    var e=pool[i];var h='<div class=\"rvc-item\"><div class=\"rvc-q\">'+(i+1)+'. '+esc(e.stem)+'</div>';
    (e.options||[]).forEach(function(op,oi){h+='<div class=\"rvc-opt\" data-i=\"'+oi+'\"><span class=\"lb\">'+L[oi]+'</span><span>'+esc(op)+'</span></div>';});
    h+='<div id=\"rvcFb\"></div></div>';box.innerHTML=h;
    box.querySelectorAll('.rvc-opt').forEach(function(el){el.addEventListener('click',function(){
      if(box.dataset.done)return;box.dataset.done='1';var pick=+el.dataset.i,ok=pick===e.ans;
      box.querySelectorAll('.rvc-opt').forEach(function(x){var xi=+x.dataset.i;if(xi===e.ans)x.classList.add('ok');else if(xi===pick)x.classList.add('no');});
      R.graded(e.id,ok);if(ok)right++;
      box.querySelector('#rvcFb').innerHTML='<div class=\"rvc-exp\"><b>'+(ok?'✅ 答對':'❌ 答錯')+'・正解 '+L[e.ans]+'：</b>'+esc(e.expl||'')+'</div><button class=\"rvc-primary\">下一題 ▶</button>';
      box.querySelector('#rvcFb button').addEventListener('click',function(){i++;delete box.dataset.done;draw();});
    });});}
  draw();
}
function paintWords(pane,V,o){
  if(!V.length){pane.innerHTML='<div class=\"rvc-empty\">還沒有生字 📖<br>閱讀或做題時點不會的單字，就會收進這裡。</div>';return;}
  var h='<button class=\"rvc-primary\" id=\"rvcFl\">🃏 翻卡複習（'+V.length+'）</button>';
  V.forEach(function(e,idx){h+='<div class=\"rvc-word\"><div><div class=\"w\">'+esc(e.word)+' <span style=\"font-size:11px;color:#9aa\">'+esc(e.pos||'')+'</span></div><div class=\"z\">'+esc(e.zh)+'</div></div><span class=\"src\">'+esc(e.cat||'')+'</span>'
    +'<button class=\"rvc-ic\" data-say=\"'+esc(e.word)+'\">🔊</button>'
    +((!e.zh||e.zh==='（待查）')?'<button class=\"rvc-ic\" data-fill=\"'+esc(e.word)+'\">✏️</button>':'')
    +'<button class=\"rvc-ic\" data-del=\"'+esc(e.word)+'\">🗑️</button></div>';});
  pane.innerHTML=h;
  pane.querySelector('#rvcFl').addEventListener('click',function(){startFlash(V,o);});
  pane.querySelectorAll('[data-say]').forEach(function(b){b.addEventListener('click',function(){speak(b.dataset.say);});});
  pane.querySelectorAll('[data-fill]').forEach(function(b){b.addEventListener('click',function(){var w=b.dataset.fill,zh=prompt('輸入「'+w+'」的中文意思：');if(zh&&zh.trim()){R.setWordZh(w,zh.trim());o.remove();openSelf();}});});
  pane.querySelectorAll('[data-del]').forEach(function(b){b.addEventListener('click',function(){if(confirm('移除生字「'+b.dataset.del+'」？')){R.removeWord(b.dataset.del);o.remove();openSelf();}});});
}
function startFlash(V,parent){
  parent.remove();var i=0;var o=ov('🃏 生字翻卡','<div id=\"rvcF\"></div>');
  function draw(){var box=o.querySelector('#rvcF');if(i>=V.length){box.innerHTML='<div class=\"rvc-empty\">複習完成！👏</div><button class=\"rvc-primary\">完成</button>';box.querySelector('button').addEventListener('click',function(){o.remove();refreshFab();});return;}
    var e=V[i];box.innerHTML='<div class=\"rvc-flash\" id=\"cf\"><div class=\"fw\">'+esc(e.word)+'</div><div style=\"font-size:12px;color:#9aa;margin-top:6px\">點卡片看中文・🔊</div></div>';
    var flip=false,cf=box.querySelector('#cf');
    cf.addEventListener('click',function(){if(!flip){flip=true;cf.innerHTML='<div class=\"fw\">'+esc(e.word)+'</div><div class=\"fz\">'+esc(e.zh)+'</div>';speak(e.word);
      var g=document.createElement('div');g.className='rvc-grade';g.innerHTML='<button class=\"rvc-bad\">還不熟</button><button class=\"rvc-good\">記得了</button>';box.appendChild(g);
      g.children[0].addEventListener('click',function(){R.wordGraded(e.word,false);i++;draw();});
      g.children[1].addEventListener('click',function(){R.wordGraded(e.word,true);i++;draw();});
    }else speak(e.word);});}
  draw();
}
function mountSelf(){var fab=document.createElement('button');fab.id='rvcFab';fab.className='rvc-fab';fab.addEventListener('click',openSelf);document.body.appendChild(fab);refreshFab();}

/* ===== Hub：只總覽 ===== */
function mountOverview(){
  var host=document.getElementById('dash');var card=document.createElement('div');card.className='rvc-card';card.id='rvcCard';
  if(host&&host.parentNode)host.parentNode.insertBefore(card,host.nextSibling);else document.body.insertBefore(card,document.body.firstChild);
  var w=R.wrong(),v=R.words();var per={};
  function acc(id,kind){if(!NSMAP[id])return;per[id]=per[id]||{w:0,v:0};per[id][kind]++;}
  for(var k in w){if(w[k].due<=NOW)acc(w[k].app,'w');}
  for(var k2 in v){if(v[k2].due<=NOW)acc(v[k2].app,'v');}
  var ids=Object.keys(per);
  var h='<h3>📝 我的複習</h3>';
  if(!ids.length){h+='<div class=\"rvc-none\">目前沒有待複習的錯題或生字 🎉<br>去各 App 練習，答錯的題目、閱讀點的生字，會分別留在<b>那支 App</b> 裡等你複習。</div>';}
  else{h+='<div class=\"rvc-sub\">點進該 App 複習自己的錯題與生字（各程度分開，不混在一起）</div>';
    ids.forEach(function(id){var m=NSMAP[id],p=per[id];h+='<a class=\"rvc-approw\" href=\"'+m.url+'\"><div><div class=\"an\">'+esc(m.name)+'</div><div class=\"am\">'+(p.w?'錯題 '+p.w+' 題':'')+(p.w&&p.v?'・':'')+(p.v?'生字 '+p.v+' 個':'')+'</div></div><span class=\"ag\">去複習 ▶</span></a>';});}
  card.innerHTML=h;
}

if(ISHUB){if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',mountOverview);else mountOverview();}
else{if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',mountSelf);else mountSelf();}

      else location.reload();

  }
  function show(){if(shown)return;shown=true;mkBanner();}

    if(!r||watched)return; watched=true; reg=r;
    if(r.waiting&&navigator.serviceWorker.controller)show();
    r.addEventListener('updatefound',function(){var nw=r.installing;if(!nw)return;
      nw.addEventListener('statechange',function(){if(nw.state==='installed'&&navigator.serviceWorker.controller)show();});});
    try{setInterval(function(){r.update().catch(function(){});},30*60*1000);}catch(e){}
  }
  navigator.serviceWorker.getRegistration().then(watch).catch(function(){});
  navigator.serviceWorker.ready.then(watch).catch(function(){});
  navigator.serviceWorker.addEventListener('controllerchange',function(){if(refreshing)return;refreshing=true;location.reload();});
})();
</script>
